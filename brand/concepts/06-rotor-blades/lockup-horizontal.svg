<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 232 56" width="232" height="56" fill="none" role="img" aria-label="Image Rotator">
  <title>Image Rotator — Rotor Blades, horizontal lockup</title>
  <defs>
    <mask id="hub">
      <rect width="48" height="48" fill="white"/>
      <circle cx="24" cy="24" r="2.6" fill="black"/>
    </mask>
  </defs>
  <g transform="translate(4,4)">
    <g mask="url(#hub)" fill="#23d9b7" stroke="none">
      <path d="M24 24 C 19 19, 19 10, 26 6 C 27 12, 27 19, 24 24 Z"/>
      <path d="M24 24 C 19 19, 19 10, 26 6 C 27 12, 27 19, 24 24 Z" transform="rotate(90 24 24)"/>
      <path d="M24 24 C 19 19, 19 10, 26 6 C 27 12, 27 19, 24 24 Z" transform="rotate(180 24 24)"/>
      <path d="M24 24 C 19 19, 19 10, 26 6 C 27 12, 27 19, 24 24 Z" transform="rotate(270 24 24)"/>
    </g>
  </g>
  <text x="64" y="35" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="23" letter-spacing="-0.3">
    <tspan fill="#fafafa" font-weight="600">Image </tspan><tspan fill="#23d9b7" font-weight="700">Rotator</tspan>
  </text>
</svg>
